services:
  # Backend API
  - type: web
    name: hexdraft-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hexdraft-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health

  # Frontend static site
  - type: web
    name: hexdraft-frontend
    runtime: static
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://hexdraft-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: hexdraft-db
    plan: starter
    databaseName: hexdraft
    postgresMajorVersion: "16"
