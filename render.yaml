services:
  # Backend API
  - type: web
    name: card-clash-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: card-clash-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_URL
        value: https://card-clash-frontend.onrender.com
    healthCheckPath: /health

  # Frontend static site
  - type: web
    name: card-clash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://card-clash-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: card-clash-db
    plan: basic-256mb
    databaseName: card_clash
    postgresMajorVersion: "16"
